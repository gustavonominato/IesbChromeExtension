<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Relatório de Presença</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: #f5f5f5;
            color: #222;
        }

        h1 {
            margin-top: 0;
            color: #1d4ed8;
        }

        .card {
            background: white;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .resumo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            margin-top: 12px;
        }

        .resumo-item {
            background: #eff6ff;
            border-radius: 6px;
            padding: 12px;
        }

        .resumo-item strong {
            display: block;
            font-size: 20px;
            margin-top: 6px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
            background: white;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
            font-size: 13px;
        }

        th {
            background: #1d4ed8;
            color: white;
            position: sticky;
            top: 0;
        }

        tr:nth-child(even) {
            background: #f9fafb;
        }

        .presente {
            color: #15803d;
            font-weight: bold;
        }

        .falta {
            color: #dc2626;
            font-weight: bold;
        }

        .loading {
            font-size: 18px;
            text-align: center;
            margin-top: 40px;
        }
    </style>
</head>
<body>

<h1>Relatório de Presença</h1>

<div id="loading" class="loading">
    Carregando dados processados...
</div>

<div id="conteudo" style="display:none;">

    <div class="card">
        <h2>Resumo Geral</h2>

        <div class="resumo-grid">
            <div class="resumo-item">
                Arquivos Processados
                <strong id="totalArquivos">0</strong>
            </div>

            <div class="resumo-item">
                Alunos Encontrados
                <strong id="totalAlunos">0</strong>
            </div>

            <div class="resumo-item">
                Aulas Identificadas
                <strong id="totalAulas">0</strong>
            </div>

            <div class="resumo-item">
                Registros Processados
                <strong id="totalRegistros">0</strong>
            </div>
        </div>
    </div>

    <div class="card">
        <h2>Resumo por Aula</h2>

        <table>
            <thead>
            <tr>
                <th>Data</th>
                <th>Presenças</th>
                <th>Faltas</th>
            </tr>
            </thead>
            <tbody id="tbodyResumoAulas"></tbody>
        </table>
    </div>

    <div class="card">
        <h2>Consolidado por Aluno</h2>

        <div style="overflow:auto; max-height: 600px;">
            <table>
                <thead id="theadConsolidado"></thead>
                <tbody id="tbodyConsolidado"></tbody>
            </table>
        </div>
    </div>

</div>

<script src="relatorio.js"></script>
</body>
</html>
