<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <title>Capturar e Aplicar</title>
    <style>
        body {
            width: 260px;
            padding: 12px;
            font-family: Arial, sans-serif;
        }

        button {
            width: 100%;
            padding: 10px;
            cursor: pointer;
            border: none;
            border-radius: 6px;
            background: #0d6efd;
            color: white;
            font-size: 14px;
        }

        #status {
            margin-top: 10px;
            font-size: 12px;
            color: #444;
        }

        #resumoPresenca {
            display: none;
            margin-top: 12px;
            padding: 10px;
            border-radius: 6px;
            background: #f3f4f6;
            color: #333;
            font-size: 12px;
            line-height: 1.5;
        }

        #resumoPresenca strong {
            display: block;
            margin-bottom: 4px;
            font-size: 13px;
        }

        #listaAulasProcessadas {
            margin-top: 4px;
        }

        #btnVerRelatorio {
            margin-top: 4px;
        }

        #selecaoNotas {
            display: none;
            margin-top: 12px;
            padding: 10px;
            border-radius: 6px;
            background: #f8fafc;
            color: #333;
            font-size: 12px;
            line-height: 1.4;
            border: 1px solid #e5e7eb;
        }

        #selecaoNotas strong {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
        }

        .linha-coluna-nota {
            display: flex;
            align-items: flex-start;
            gap: 6px;
            padding: 4px 0;
            border-top: 1px solid #e5e7eb;
        }

        .linha-coluna-nota:first-child {
            border-top: none;
        }

        .linha-coluna-nota input {
            margin-top: 2px;
        }

        .linha-coluna-nota label {
            flex: 1;
            cursor: pointer;
        }

        .linha-aula-processada {
            padding: 3px 0;
            border-top: 1px solid #ddd;
        }

        .linha-aula-processada:first-child {
            border-top: none;
        }

        .download-processado {
            background: #198754 !important;
            color: #fff !important;
        }
    </style>
</head>
<body>
<button id="btnExecutar">Carregando...</button>
<div id="status">Inicializando...</div>
<div id="selecaoNotas">
    <strong>Colunas de notas para aplicar</strong>
    <div id="listaColunasNotas"></div>
</div>

<div id="resumoPresenca">
    <strong>Presença processada</strong>
    <div>Arquivos processados: <span id="totalArquivosProcessados">0</span></div>
    <div>Alunos encontrados: <span id="totalAlunosProcessados">0</span></div>
    <div style="margin-top: 8px;">Aulas identificadas:</div>
    <div id="listaAulasProcessadas"></div>
</div>

<button id="btnVerRelatorio" class="btn-relatorio" type="button">
    Ver relatório completo
</button>

<script src="popup.js"></script>
</body>
</html>
